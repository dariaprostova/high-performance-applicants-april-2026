<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>HIGH PERFORMANCE — Заявки апрель 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e;
      --surface: rgba(24,24,24,0.9);
      --border: #272727;
      --text: #ebebeb;
      --text-secondary: #999;
      --accent: #c9a96e;
      --radius: 16px;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, rgba(201,169,110,0.1), transparent 26%), var(--bg);
      min-height: 100vh;
      padding: 32px 18px 48px;
    }
    .shell { max-width: 1200px; margin: 0 auto; }
    .hero { text-align: center; padding: 30px 0 28px; }
    .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 6px; text-transform: uppercase; color: var(--accent); margin-bottom: 18px; }
    h1 { font-family: 'Playfair Display', serif; font-weight: 400; font-size: clamp(38px, 7vw, 68px); line-height: 1.02; margin-bottom: 14px; }
    h1 em { color: var(--accent); font-style: italic; }
    .sub { max-width: 760px; margin: 0 auto; color: var(--text-secondary); font-weight: 300; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 26px 0 30px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; text-decoration: none;
      border-radius: 999px; padding: 14px 20px; border: 1px solid var(--border);
      color: var(--text); background: var(--surface); transition: .2s ease;
    }
    .btn.primary { background: var(--accent); color: #111; border-color: var(--accent); font-weight: 600; }
    .btn:hover { transform: translateY(-1px); }
    .frame-wrap {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    iframe {
      width: 100%; height: min(78vh, 1100px); border: 0; border-radius: 10px; background: #222;
    }
    .fallback { color: var(--text-secondary); font-size: 14px; margin-top: 14px; text-align: center; }
    @media (max-width: 720px) { iframe { height: 72vh; } }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div class="eyebrow">High Performance</div>
      <h1>Заявки <em>апрель 2026</em></h1>
      <p class="sub">Публичный viewer для документа. Если встроенный просмотрщик у кого-то не откроется, ниже есть прямая ссылка на скачивание исходного PDF.</p>
      <div class="actions">
        <a class="btn primary" href="../High%20Performance%20%E2%80%94%20%D0%97%D0%B0%D1%8F%D0%B2%D0%BA%D0%B8%20%D0%B0%D0%BF%D1%80%D0%B5%D0%BB%D1%8C%202026.pdf" target="_blank" rel="noreferrer">Открыть PDF</a>
        <a class="btn" href="team-vault-7m4k9p2x6c8q.html">Назад к team access</a>
      </div>
    </div>
    <div class="frame-wrap">
      <iframe src="../High%20Performance%20%E2%80%94%20%D0%97%D0%B0%D1%8F%D0%B2%D0%BA%D0%B8%20%D0%B0%D0%BF%D1%80%D0%B5%D0%BB%D1%8C%202026.pdf#view=FitH" title="High Performance — Заявки апрель 2026"></iframe>
      <p class="fallback">Если PDF не отображается внутри страницы, используйте кнопку <strong>Открыть PDF</strong>.</p>
    </div>
  </div>
</body>
</html>
